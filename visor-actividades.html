<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas de Actividades</title>
    <script src="app-bridge.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
            background: #f3f6fb;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            overflow: hidden;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 14px 42px rgba(31, 41, 55, 0.16);
        }

        .page-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9ff;
            border-bottom: 1px solid #e5e7eb;
        }

        .nav-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-button,
        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.92em;
            font-weight: 700;
            text-decoration: none;
        }

        .nav-button {
            color: #2563eb;
            background: #ffffff;
            border: 2px solid #2563eb;
            cursor: pointer;
        }

        .nav-link {
            color: #ffffff;
            background: #2563eb;
            border: 2px solid #2563eb;
        }

        .header {
            padding: 28px 30px;
            color: #ffffff;
            background: linear-gradient(135deg, #2563eb 0%, #0f766e 100%);
        }

        .header h1 {
            margin-bottom: 6px;
            font-size: 2em;
            letter-spacing: 0;
        }

        .header p {
            opacity: 0.92;
        }

        .content {
            padding: 24px;
        }

        .message {
            display: none;
            margin-bottom: 16px;
            padding: 13px 16px;
            border-radius: 6px;
        }

        .message.show {
            display: block;
        }

        .message.info {
            color: #0c5460;
            background: #d1ecf1;
            border: 1px solid #bee5eb;
        }

        .message.error {
            color: #721c24;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        .message.success {
            color: #155724;
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(160px, 220px) minmax(190px, 240px) minmax(190px, 260px) minmax(220px, 1fr) auto;
            gap: 12px;
            align-items: end;
            margin-bottom: 18px;
            padding: 16px;
            background: #f8f9ff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #4b5563;
            font-size: 0.88em;
            font-weight: 700;
        }

        select,
        input {
            width: 100%;
            min-height: 40px;
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font: inherit;
            background: #ffffff;
        }

        button {
            min-height: 40px;
            padding: 9px 16px;
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:disabled,
        select:disabled,
        input:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .stat {
            padding: 14px;
            background: #f8f9ff;
            border-left: 4px solid #2563eb;
            border-radius: 8px;
        }

        .stat span {
            display: block;
            margin-bottom: 4px;
            color: #6b7280;
            font-size: 0.86em;
        }

        .stat strong {
            color: #1d4ed8;
            font-size: 1.28em;
        }

        .table-wrap {
            overflow: auto;
            max-height: 58vh;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        table {
            width: 100%;
            min-width: 980px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th,
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: middle;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 2;
            color: #ffffff;
            background: #2563eb;
        }

        .student-col {
            position: sticky;
            left: 0;
            z-index: 1;
            width: 280px;
            background: #ffffff;
        }

        th.student-col {
            z-index: 3;
            background: #1d4ed8;
        }

        tr:hover td {
            background: #f8f9ff;
        }

        .activity-col {
            width: 138px;
            text-align: center;
        }

        .activity-head {
            display: grid;
            gap: 3px;
            line-height: 1.15;
        }

        .activity-head span {
            font-size: 0.78em;
            opacity: 0.86;
        }

        .grade {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 30px;
            padding: 4px 8px;
            border-radius: 999px;
            font-weight: 800;
        }

        .grade.ok {
            color: #166534;
            background: #dcfce7;
        }

        .grade.warn {
            color: #92400e;
            background: #fef3c7;
        }

        .grade.bad {
            color: #991b1b;
            background: #fee2e2;
        }

        .grade.empty {
            color: #6b7280;
            background: #f3f4f6;
        }

        .empty-row {
            padding: 28px;
            color: #6b7280;
            text-align: center;
        }

        @media (max-width: 850px) {
            body {
                padding: 10px;
            }

            .content {
                padding: 16px;
            }

            .toolbar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="page-nav" aria-label="Navegacion">
            <div class="nav-group">
                <button class="nav-button" type="button" onclick="window.history.back()">Atras</button>
                <a class="nav-link" href="index.html">Inicio</a>
            </div>
            <div class="nav-group">
                <a class="nav-link" href="gestor-notas.html">Anadir notas</a>
                <a class="nav-link" href="visor-notas.html">RRAA y CCEE</a>
            </div>
        </nav>

        <header class="header">
            <h1>Notas de actividades</h1>
            <p>Consulta practicas, memorias, otras actividades y controles por unidad.</p>
        </header>

        <main class="content">
            <div id="message" class="message"></div>

            <section class="toolbar" aria-label="Filtros">
                <div>
                    <label for="unidadSelect">Unidad</label>
                    <select id="unidadSelect"></select>
                </div>
                <div>
                    <label for="tipoSelect">Tipo</label>
                    <select id="tipoSelect">
                        <option value="practicas">Practicas</option>
                    </select>
                </div>
                <div>
                    <label for="actividadSelect">Actividad</label>
                    <select id="actividadSelect"></select>
                </div>
                <div>
                    <label for="searchInput">Buscar alumno</label>
                    <input id="searchInput" type="search" placeholder="Nombre del alumno">
                </div>
                <button type="button" id="reloadButton">Recargar</button>
            </section>

            <section class="stats" aria-label="Resumen">
                <div class="stat">
                    <span>Archivo</span>
                    <strong id="fileName">-</strong>
                </div>
                <div class="stat">
                    <span>Unidad</span>
                    <strong id="unitName">-</strong>
                </div>
                <div class="stat">
                    <span>Alumnos</span>
                    <strong id="studentCount">0</strong>
                </div>
                <div class="stat">
                    <span>Actividades</span>
                    <strong id="activityCount">0</strong>
                </div>
                <div class="stat">
                    <span>Notas registradas</span>
                    <strong id="gradedCount">0</strong>
                </div>
                <div class="stat">
                    <span>Media visible</span>
                    <strong id="averageGrade">-</strong>
                </div>
            </section>

            <section class="table-wrap" aria-label="Tabla de notas de actividades">
                <table>
                    <thead id="notesHead"></thead>
                    <tbody id="notesBody">
                        <tr><td class="empty-row">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        const TYPE_LABELS = {
            practicas: "Practicas",
            memorias: "Memorias",
            otros: "Otras actividades",
            controles: "Controles"
        };

        let state = null;
        const activityCache = new Map();

        const messageBox = document.getElementById("message");
        const unidadSelect = document.getElementById("unidadSelect");
        const tipoSelect = document.getElementById("tipoSelect");
        const actividadSelect = document.getElementById("actividadSelect");
        const searchInput = document.getElementById("searchInput");
        const reloadButton = document.getElementById("reloadButton");
        const notesHead = document.getElementById("notesHead");
        const notesBody = document.getElementById("notesBody");
        const fileName = document.getElementById("fileName");
        const unitName = document.getElementById("unitName");
        const studentCount = document.getElementById("studentCount");
        const activityCount = document.getElementById("activityCount");
        const gradedCount = document.getElementById("gradedCount");
        const averageGrade = document.getElementById("averageGrade");

        document.addEventListener("DOMContentLoaded", () => {
            if (!window.electronExcel) {
                showMessage("Abre esta pantalla desde la aplicacion local.", "error");
                setDisabled(true);
                return;
            }

            reloadButton.addEventListener("click", () => loadActivity({ force: true }));
            unidadSelect.addEventListener("change", () => loadActivity({ keepActivity: false }));
            tipoSelect.addEventListener("change", () => loadActivity({ keepActivity: false }));
            actividadSelect.addEventListener("change", () => loadActivity());
            searchInput.addEventListener("input", renderTable);
            loadInitial();
        });

        async function loadInitial() {
            try {
                setDisabled(true);
                showMessage("Leyendo U1, practicas y primer alumno...", "info");
                const data = await window.electronExcel.getNotasActividad({
                    unidad: "U1",
                    tipo: "practicas",
                    actividad: 1,
                    maxAlumnos: 1
                });

                if (!data) {
                    showMessage("No se encontro ningun Excel seleccionado.", "error");
                    return;
                }

                renderUnitSelect(data.unidades || [], data.unidad);
                renderTypeSelect(data.tipos || []);
                renderActivitySelect(data.actividades || [], data.actividad);
                state = data;
                renderAll();
                showMessage("Primera actividad lista. Cargando datos completos...", "info");
                await loadActivity({ force: true });
            } catch (error) {
                showMessage(error.message || "No se pudieron cargar las unidades.", "error");
            } finally {
                setDisabled(false);
            }
        }

        async function loadActivity(options = {}) {
            const unidad = unidadSelect.value || "U1";
            const tipo = tipoSelect.value || "practicas";
            const actividad = options.keepActivity === false ? 1 : Number(actividadSelect.value || 1);
            const cacheKey = `${unidad}:${tipo}:${actividad}`;

            try {
                setDisabled(true);
                if (!options.force && activityCache.has(cacheKey)) {
                    state = activityCache.get(cacheKey);
                    renderControls(state);
                    renderAll();
                    showMessage("Actividad cargada desde cache.", "success");
                    return;
                }

                showMessage("Leyendo actividad seleccionada...", "info");
                const data = await window.electronExcel.getNotasActividad({
                    unidad,
                    tipo,
                    actividad
                });

                if (!data) {
                    showMessage("No se encontro ningun Excel seleccionado.", "error");
                    return;
                }

                state = data;
                activityCache.set(`${data.unidad}:${data.tipo}:${data.actividad}`, data);
                renderControls(data);
                renderAll();
                showMessage("Notas de la actividad cargadas.", "success");
            } catch (error) {
                showMessage(error.message || "No se pudieron cargar las actividades.", "error");
            } finally {
                setDisabled(false);
            }
        }

        function renderControls(data) {
            renderUnitSelect(data.unidades || [], data.unidad);
            renderTypeSelect(data.tipos || [], data.tipo);
            renderActivitySelect(data.actividades || [], data.actividad);
        }

        function renderAll() {
            if (!state) {
                return;
            }

            const alumnos = getVisibleStudents();
            const values = [];

            alumnos.forEach((alumno) => {
                const numeric = parseGrade(alumno.nota);
                if (numeric !== null) {
                    values.push(numeric);
                }
            });

            fileName.textContent = state.fileName || "-";
            unitName.textContent = getUnitLabel(state.unidad);
            studentCount.textContent = alumnos.length;
            activityCount.textContent = formatActivityCounter(state);
            gradedCount.textContent = values.length;
            averageGrade.textContent = values.length ? formatGrade(values.reduce((total, value) => total + value, 0) / values.length) : "-";
            renderTable();
        }

        function renderTable() {
            if (!state) {
                return;
            }

            const alumnos = getVisibleStudents();
            const type = (state.tipos || []).find((item) => item.key === state.tipo);
            const blockName = state.block && state.block.nombre ? state.block.nombre : "Sin nombre";

            notesHead.innerHTML = `
                <tr>
                    <th class="student-col">Alumno</th>
                    <th class="activity-col">
                        <span class="activity-head">
                            <strong>${escapeHtml(shortTypeLabel(type?.label || state.tipo))} ${escapeHtml(state.actividad)}</strong>
                            <span>${escapeHtml(blockName)}</span>
                        </span>
                    </th>
                </tr>
            `;

            if (!alumnos.length) {
                notesBody.innerHTML = `<tr><td class="empty-row" colspan="2">No hay alumnos para mostrar.</td></tr>`;
                return;
            }

            notesBody.innerHTML = alumnos.map((alumno) => `
                <tr>
                    <td class="student-col">${escapeHtml(alumno.nombre)}</td>
                    <td class="activity-col">${gradeBadge(alumno.nota)}</td>
                </tr>
            `).join("");
        }

        function renderUnitSelect(unidades, selected) {
            unidadSelect.innerHTML = (unidades || []).map((unidad) => `
                <option value="${escapeHtml(unidad.codigo)}"${String(unidad.codigo) === String(selected) ? " selected" : ""}>
                    ${escapeHtml(unidad.label || unidad.codigo)}
                </option>
            `).join("");
        }

        function renderTypeSelect(tipos, selectedValue) {
            const selected = selectedValue || tipoSelect.value || "practicas";
            tipoSelect.innerHTML = `${(tipos || []).map((tipo) => `
                <option value="${escapeHtml(tipo.key)}">${escapeHtml(tipo.label || TYPE_LABELS[tipo.key] || tipo.key)} (${tipo.total || 0})</option>
            `).join("")}`;
            tipoSelect.value = Array.from(tipoSelect.options).some((option) => option.value === selected) ? selected : "practicas";
        }

        function renderActivitySelect(actividades, selectedValue) {
            actividadSelect.innerHTML = (actividades || []).map((actividad) => `
                <option value="${escapeHtml(actividad.numero)}"${Number(actividad.numero) === Number(selectedValue) ? " selected" : ""}>
                    ${escapeHtml(actividad.nombre ? `Actividad ${actividad.numero} - ${actividad.nombre}` : `Actividad ${actividad.numero}`)}
                </option>
            `).join("");
        }

        function getVisibleStudents() {
            const query = normalize(searchInput.value);
            return (state.alumnos || []).filter((alumno) => !query || normalize(alumno.nombre).includes(query));
        }

        function getUnitLabel(codigo) {
            const unit = (state.unidades || []).find((item) => item.codigo === codigo);
            return unit ? (unit.label || unit.codigo) : codigo;
        }

        function formatActivityCounter(data) {
            const type = (data.tipos || []).find((item) => item.key === data.tipo);
            if (!type) {
                return data.actividades ? data.actividades.length : 0;
            }

            return `${data.actividad}/${type.total || 0}`;
        }

        function shortTypeLabel(label) {
            return String(label || "").replace("Otras actividades", "Otras");
        }

        function gradeBadge(value) {
            const numeric = parseGrade(value);
            if (numeric === null) {
                return `<span class="grade empty">-</span>`;
            }

            const cls = numeric >= 5 ? "ok" : numeric >= 4 ? "warn" : "bad";
            return `<span class="grade ${cls}">${formatGrade(numeric)}</span>`;
        }

        function parseGrade(value) {
            if (value === null || value === undefined || String(value).trim() === "") {
                return null;
            }

            const numeric = Number(String(value).replace(",", "."));
            return Number.isNaN(numeric) ? null : numeric;
        }

        function formatGrade(value) {
            return Number(value).toLocaleString("es-ES", {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
        }

        function normalize(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .trim();
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showMessage(text, type = "info") {
            messageBox.textContent = text;
            messageBox.className = `message show ${type}`;
        }

        function setDisabled(disabled) {
            [unidadSelect, tipoSelect, actividadSelect, searchInput, reloadButton].forEach((element) => {
                element.disabled = disabled;
            });
        }
    </script>
</body>
</html>

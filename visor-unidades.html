<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas por Unidad</title>
    <script src="app-bridge.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            padding: 20px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
            background: #f3f6fb;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 14px 42px rgba(31, 41, 55, 0.16);
            overflow: hidden;
        }

        .page-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9ff;
            border-bottom: 1px solid #e5e7eb;
        }

        .nav-group { display: flex; flex-wrap: wrap; gap: 10px; }

        .nav-button, .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            font: inherit;
            font-size: 0.88rem;
            font-weight: 700;
            color: #374151;
            text-decoration: none;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .nav-button:hover, .nav-link:hover { border-color: #6366f1; background: #f5f3ff; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            padding: 16px 20px;
            border-bottom: 1px solid #e5e7eb;
            background: #fafbff;
        }

        .toolbar label { font-size: 0.9rem; font-weight: 700; color: #374151; }

        select {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            font: inherit;
            font-size: 0.92rem;
            background: #fff;
            cursor: pointer;
            min-width: 220px;
        }
        select:focus { outline: 2px solid #6366f1; outline-offset: 1px; }

        .section-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #312e81;
            padding: 18px 20px 10px;
            border-bottom: 2px solid #e0e7ff;
        }

        .section-subtitle {
            font-size: 0.85rem;
            font-weight: 400;
            color: #6b7280;
            margin-left: 8px;
        }

        .table-wrap {
            overflow-x: auto;
            padding: 0 0 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead th {
            background: #eef2ff;
            color: #3730a3;
            font-weight: 800;
            padding: 10px 14px;
            text-align: center;
            border-bottom: 2px solid #c7d2fe;
            white-space: nowrap;
        }

        thead th.col-name { text-align: left; min-width: 200px; }

        tbody tr:nth-child(even) { background: #fafafa; }
        tbody tr:hover { background: #eef2ff; }

        tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
        }

        tbody td.col-name {
            text-align: left;
            font-weight: 600;
        }

        .grade {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            min-width: 44px;
        }

        .grade.ok    { background: #dcfce7; color: #166534; }
        .grade.warn  { background: #fef3c7; color: #92400e; }
        .grade.bad   { background: #fee2e2; color: #991b1b; }
        .grade.empty { background: #f3f4f6; color: #9ca3af; }

        .grade.big {
            padding: 4px 12px;
            font-size: 1rem;
            border-radius: 8px;
        }

        .divider {
            height: 24px;
            background: #f3f6fb;
            border-top: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            font-size: 1rem;
        }

        .error {
            margin: 16px 20px;
            padding: 14px 18px;
            background: #fee2e2;
            color: #991b1b;
            border-radius: 8px;
            font-size: 0.93rem;
        }

        .empty-msg {
            padding: 28px;
            text-align: center;
            color: #9ca3af;
            font-style: italic;
        }

        .btn-ra-toggle {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            padding: 3px 9px;
            background: #e0e7ff;
            border: 1px solid #a5b4fc;
            border-radius: 6px;
            font: inherit;
            font-size: 0.78rem;
            font-weight: 700;
            color: #3730a3;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            vertical-align: middle;
        }
        .btn-ra-toggle:hover { background: #c7d2fe; border-color: #6366f1; }
        .btn-ra-toggle.active { background: #6366f1; color: #fff; border-color: #4338ca; }

        .ra-panel {
            margin: 0 0 4px;
            border: 1px solid #c7d2fe;
            border-radius: 8px;
            background: #f5f3ff;
            overflow: hidden;
        }

        .ra-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #eef2ff;
            border-bottom: 1px solid #c7d2fe;
            font-size: 0.85rem;
            font-weight: 700;
            color: #3730a3;
        }

        .ra-panel-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #6b7280;
            padding: 0 4px;
            line-height: 1;
        }
        .ra-panel-close:hover { color: #374151; }

        .ra-panel-table-wrap { overflow-x: auto; }

        .ra-panel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .ra-panel-table th {
            background: #e0e7ff;
            color: #3730a3;
            font-weight: 800;
            padding: 7px 12px;
            text-align: center;
            border-bottom: 2px solid #c7d2fe;
            white-space: nowrap;
        }
        .ra-panel-table th.col-name { text-align: left; }
        .ra-panel-table td {
            padding: 7px 12px;
            border-bottom: 1px solid #e0e7ff;
            text-align: center;
        }
        .ra-panel-table td.col-name { text-align: left; font-weight: 600; }
        .ra-panel-table tr:nth-child(even) { background: #f0f4ff; }
        .ra-panel-table tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>
<div class="container">
    <nav class="page-nav">
        <div class="nav-group">
            <button class="nav-button" onclick="history.back()">← Atrás</button>
            <a class="nav-link" href="index.html">⌂ Inicio</a>
        </div>
        <div class="nav-group">
            <a class="nav-link" href="gestor-notas.html">Añadir notas</a>
            <a class="nav-link" href="visor-notas.html">RRAA y CCEE</a>
            <a class="nav-link" href="visor-actividades.html">Ver actividades</a>
        </div>
    </nav>

    <div class="toolbar">
        <label for="unitSelect">Unidad:</label>
        <select id="unitSelect"><option value="">Cargando...</option></select>
    </div>

    <div class="section-title">
        Notas de la unidad seleccionada
        <span class="section-subtitle" id="unitLabel"></span>
    </div>
    <div id="raPanel" style="display:none"></div>
    <div id="unitSection"><div class="loading">Selecciona una unidad...</div></div>

    <div class="divider"></div>

    <div class="section-title">
        Resumen de todas las unidades
        <span class="section-subtitle">Nota final por unidad y alumno</span>
    </div>
    <div id="summarySection"><div class="loading">Cargando resumen...</div></div>
</div>

<script>
    function fmt(n) {
        if (typeof n !== "number" || isNaN(n)) return "-";
        return n.toLocaleString("es-ES", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function fmtDisplay(display) {
        if (!display || display === "") return "-";
        const n = parseFloat(String(display).replace(",", "."));
        if (isNaN(n)) return "-";
        return n.toLocaleString("es-ES", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function gradeClass(n) {
        if (typeof n !== "number" || isNaN(n) || n === 0) return "empty";
        if (n >= 5) return "ok";
        if (n >= 3) return "warn";
        return "bad";
    }

    function gradeClassDisplay(display) {
        if (!display || display === "") return "empty";
        const n = parseFloat(String(display).replace(",", "."));
        return gradeClass(n);
    }

    function esc(s) {
        return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // ---- RA panel state ----
    let raOpen = false;
    let currentUnitData = null;

    function toggleRaPanel() {
        raOpen = !raOpen;
        const btn = document.getElementById("btnRaToggle");
        if (btn) btn.classList.toggle("active", raOpen);
        renderRaPanel();
    }

    function closeRaPanel() {
        raOpen = false;
        const btn = document.getElementById("btnRaToggle");
        if (btn) btn.classList.remove("active");
        renderRaPanel();
    }

    function renderRaPanel() {
        const panelEl = document.getElementById("raPanel");
        if (!raOpen || !currentUnitData) {
            panelEl.style.display = "none";
            panelEl.innerHTML = "";
            return;
        }

        const raCols = currentUnitData.raColumnas || [];
        const alumnos = currentUnitData.alumnos || [];

        let panelBody;
        if (!raCols.length) {
            panelBody = `<div style="padding:14px 18px;color:#6b7280;font-size:0.9rem;">
                No se detectaron columnas RA en esta hoja. Reinicia la aplicación para aplicar la detección actualizada.
            </div>`;
        } else {
            const headers = raCols.map(ra => `<th>${esc(ra.label)}</th>`).join("");
            const rows = alumnos.map(a => {
                const raNotas = a.raNotas || [];
                const cells = raCols.map(ra => {
                    const entry = raNotas.find(r => r.numero === ra.numero);
                    if (!entry) return `<td><span class="grade empty">-</span></td>`;
                    const cls = gradeClassDisplay(entry.display) || gradeClass(entry.nota);
                    const val = entry.display ? fmtDisplay(entry.display) : fmt(entry.nota);
                    return `<td><span class="grade ${cls}">${val}</span></td>`;
                }).join("");
                return `<tr><td class="col-name">${esc(a.nombre)}</td>${cells}</tr>`;
            }).join("");
            panelBody = `<div class="ra-panel-table-wrap">
                <table class="ra-panel-table">
                    <thead><tr>
                        <th class="col-name">Alumno/a</th>
                        ${headers}
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        }

        panelEl.style.display = "block";
        panelEl.innerHTML = `
            <div class="ra-panel">
                <div class="ra-panel-header">
                    <span>Notas finales por RA</span>
                    <button class="ra-panel-close" onclick="closeRaPanel()">✕</button>
                </div>
                ${panelBody}
            </div>`;
    }

    function renderUnitTable(data) {
        currentUnitData = data;
        const alumnos = data.alumnos || [];
        const raCols = data.raColumnas || [];
        if (!alumnos.length) return `<div class="empty-msg">No hay datos para esta unidad.</div>`;

        const rows = alumnos.map(a => {
            const cls = gradeClassDisplay(a.display) || gradeClass(a.nota);
            const val = a.display ? fmtDisplay(a.display) : fmt(a.nota);
            return `<tr>
                <td class="col-name">${esc(a.nombre)}</td>
                <td><span class="grade big ${cls}">${val}</span></td>
            </tr>`;
        }).join("");

        const raBtn = `<button id="btnRaToggle" class="btn-ra-toggle${raOpen ? " active" : ""}" onclick="toggleRaPanel()">▼ RA</button>`;

        return `<div class="table-wrap"><table>
            <thead><tr>
                <th class="col-name">Alumno/a</th>
                <th>Nota Final Unidad ${raBtn}</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table></div>`;
    }

    function renderSummaryTable(unitDataList) {
        const alumnoSet = new Map();
        unitDataList.forEach(ud => {
            (ud.alumnos || []).forEach(a => {
                if (!alumnoSet.has(a.nombre)) alumnoSet.set(a.nombre, {});
                alumnoSet.get(a.nombre)[ud.unidad] = { nota: a.nota, display: a.display };
            });
        });

        if (!alumnoSet.size) return `<div class="empty-msg">No hay datos.</div>`;

        const activeUnits = unitDataList.filter(ud => (ud.alumnos || []).some(a => a.nota !== null));

        const headers = activeUnits.map(ud =>
            `<th title="${esc(ud.label || ud.unidad)}">${esc(ud.unidad)}</th>`
        ).join("");

        const rows = [...alumnoSet.entries()].map(([nombre, notasPorUnidad]) => {
            const cells = activeUnits.map(ud => {
                const entry = notasPorUnidad[ud.unidad];
                if (!entry) return `<td><span class="grade empty">-</span></td>`;
                const cls = gradeClassDisplay(entry.display) || gradeClass(entry.nota);
                const val = entry.display ? fmtDisplay(entry.display) : fmt(entry.nota);
                return `<td><span class="grade ${cls}">${val}</span></td>`;
            }).join("");
            return `<tr><td class="col-name">${esc(nombre)}</td>${cells}</tr>`;
        }).join("");

        return `<div class="table-wrap"><table>
            <thead><tr>
                <th class="col-name">Alumno/a</th>
                ${headers}
            </tr></thead>
            <tbody>${rows}</tbody>
        </table></div>`;
    }

    let unidades = [];

    async function loadUnit(codigo, label) {
        document.getElementById("unitLabel").textContent = label ? `— ${label}` : "";
        document.getElementById("unitSection").innerHTML = `<div class="loading">Cargando...</div>`;
        raOpen = false;
        renderRaPanel();
        try {
            const data = await window.electronExcel.getNotasUnidad({ unidad: codigo });
            document.getElementById("unitSection").innerHTML = renderUnitTable(data || {});
            renderRaPanel();
        } catch (e) {
            document.getElementById("unitSection").innerHTML = `<div class="error">Error: ${esc(String(e))}</div>`;
        }
    }

    async function loadSummary() {
        document.getElementById("summarySection").innerHTML = `<div class="loading">Cargando resumen...</div>`;
        try {
            const results = [];
            for (const u of unidades) {
                const data = await window.electronExcel.getNotasUnidad({ unidad: u.codigo });
                results.push({ unidad: u.codigo, label: u.label, alumnos: (data && data.alumnos) || [] });
            }
            document.getElementById("summarySection").innerHTML = renderSummaryTable(results);
        } catch (e) {
            document.getElementById("summarySection").innerHTML = `<div class="error">Error: ${esc(String(e))}</div>`;
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        if (!window.electronExcel) {
            document.getElementById("unitSection").innerHTML = `<div class="error">No se pudo conectar con el backend.</div>`;
            return;
        }

        try {
            const data = await window.electronExcel.getNotasUnidad({ unidad: "U1" });
            if (!data) throw new Error("Sin datos");

            unidades = data.unidades || [];
            const sel = document.getElementById("unitSelect");

            if (!unidades.length) {
                sel.innerHTML = `<option value="">Sin unidades</option>`;
                return;
            }

            sel.innerHTML = unidades.map(u =>
                `<option value="${esc(u.codigo)}">${esc(u.label)}</option>`
            ).join("");

            sel.addEventListener("change", () => {
                const u = unidades.find(x => x.codigo === sel.value);
                loadUnit(sel.value, u ? u.label : "");
            });

            const first = unidades[0];
            document.getElementById("unitSection").innerHTML = renderUnitTable(data);
            document.getElementById("unitLabel").textContent = `— ${first.label}`;
            renderRaPanel();

            loadSummary();
        } catch (e) {
            document.getElementById("unitSection").innerHTML = `<div class="error">Error al cargar: ${esc(String(e))}</div>`;
        }
    });
</script>
</body>
</html>
